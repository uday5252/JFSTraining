<!DOCTYPE html>
<html lang="en">
<head>
    <title>Music Player Application</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <img id="songimage" src="/IMAGES/image-1.jpg" />

    <h2 id="songname">ABC Song</h2>
    <h3 id="singername">ABC Singer</h3>

    <div id="fixed">
        <div id="movable"></div>
    </div>

    <div id="icons">
        <i class="fa-solid fa-shuffle"></i>
        <i class="fa-solid fa-backward"></i>
        <i class="fa-solid fa-play" id="play"></i>
        <i class="fa-solid fa-forward" id="forward"></i>
        <i class="fa-regular fa-heart"></i>
    </div>

    <audio src="/AUDIOS/music-1.mp3" id="audio" />


    <script src="app.js"></script>
</body>
</html>
